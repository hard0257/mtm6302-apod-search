<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search APOD | NASA APOD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="search-page">

  <div class="page-wrapper search-page-wrapper">

    <header class="search-header">
      <nav class="navbar">

        <h1 class="logo">
          <a href="search.html">NASA APOD</a>
        </h1>

        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="favourites.html">Favourites</a></li>
          <li><a href="about.html">About APOD</a></li>
        </ul>

        <button class="menu-button" type="button" aria-label="Open menu">☰</button>

      </nav>
    </header>

    <main>
      <section class="search-page-section">

        <h2>Search APOD</h2>

        <div class="search-box">
          <h3>Find an APOD</h3>

          <p>Enter a non-future date</p>

          <form class="apod-form">

            <label for="apod-date" class="visually-hidden">Choose APOD date</label>

            <input 
              type="text" 
              id="apod-date" 
              name="apod-date" 
              value="2029-01-10"
            >

            <button type="button">Search APOD</button>

            <div class="error-message">
              Error: Please choose today or a past date
            </div>

          </form>
        </div>

      </section>
    </main>

  </div>

</body>
</html>
